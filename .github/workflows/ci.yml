name: CI

# Validates the harness control flow on every push and PR with no API keys and
# no network: byte-compile the package, then run the offline stub smoke test.
on: [push, pull_request]

jobs:
  control-flow:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Byte-compile the package
        run: python -m py_compile debate_harness/*.py
      - name: Offline control-flow test
        run: python -m unittest discover -s tests -v
